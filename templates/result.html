<!DOCTYPE html>
<html>
<head>
<title>Ride Result</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #2b5876, #4e4376);
    color: white;
    text-align: center;
}

/* TOP CARDS */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    width: 200px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.4);
}

/* MAIN SECTION */
.section {
    margin: 40px auto;
    width: 60%;
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.4);
}

h1 {
    margin-top: 20px;
}

.price {
    font-size: 20px;
    margin: 10px 0;
}

.highlight {
    color: #00ffcc;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🚖 Ride Insights</h1>

<!-- TOP INFO -->
<div class="container">

<div class="card">
    <h3>📊 Demand</h3>
    <h2>{{ demand }}</h2>
    <p>{{ demand_level }}</p>
</div>

<div class="card">
    <h3>⏱ Wait Time</h3>
    <h2>{{ wait }}</h2>
</div>

<div class="card">
    <h3>💰 Savings</h3>
    <h2>₹{{ savings }}</h2>
</div>

</div>

<!-- PRICE COMPARISON -->
<div class="section">

<h2>💸 Price Comparison</h2>

<p class="price">🚖 Uber Bike: ₹{{ uber }}</p>
<p class="price">🏍 Rapido Bike: ₹{{ rapido }}</p>

<hr>

<p class="highlight">💡 Best Option: {{ better }}</p>

</div>

</body>
</html>
